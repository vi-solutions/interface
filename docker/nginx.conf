events {}

http {
  # Shared proxy settings
  proxy_http_version  1.1;
  proxy_set_header    Host              $host;
  proxy_set_header    X-Real-IP         $remote_addr;
  proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header    X-Forwarded-Proto $scheme;
  proxy_set_header    Upgrade           $http_upgrade;
  proxy_set_header    Connection        "upgrade";
  proxy_read_timeout  60s;

  # ── HTTP: redirect everything to HTTPS except ACME challenges ────────────────
  server {
    listen 80;
    server_name app.interfaceenviro.ca api.interfaceenviro.ca;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── app.interfaceenviro.ca (Next.js) ─────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name app.interfaceenviro.ca;

    ssl_certificate     /etc/letsencrypt/live/app.interfaceenviro.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.interfaceenviro.ca/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    location / {
      proxy_pass http://web:3000;
    }
  }

  # ── api.interfaceenviro.ca (NestJS) ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.interfaceenviro.ca;

    ssl_certificate     /etc/letsencrypt/live/app.interfaceenviro.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.interfaceenviro.ca/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    location / {
      proxy_pass http://api:3001;
    }
  }
}
